experiment_name: ednet_v2_real_dataset_validation
version: v2

dataset:
  name: EdNet
  raw_data_dir: 02_data/external/ednet
  processed_data_dir: 02_data/processed/ednet
  target_students: 100
  target_interactions: 5000
  min_interactions_per_student: 20
  max_interactions_per_student: 100
  random_seed: 17

task:
  type: correctness_prediction
  target_column: is_correct
  split_strategy: time_based
  test_size: 0.2

features:
  include_student_history: true
  include_question_history: true
  include_rolling_accuracy: true
  rolling_windows:
    - 5
    - 10
  include_elapsed_time: true
  include_time_since_previous: true

models:
  baseline:
    - dummy_majority
  supervised:
    - logistic_regression
    - random_forest
    - gradient_boosting

outputs:
  mapped_interactions: 02_data/processed/ednet/ednet_interactions_mapped.csv
  feature_dataset: 02_data/processed/ednet/ednet_features.csv
  supervised_metrics: 06_results/tables/ednet/ednet_supervised_metrics.csv
  v1_v2_comparison: 06_results/tables/ednet/synthetic_vs_ednet_comparison.csv

notes:
  full_ednet_processing: false
  deep_learning_models: false
  real_rl_environment: false
  purpose: controlled_real_dataset_validation
